<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<title>Smart Edu Pro</title>

<style>
body { font-family: Arial; margin:0; background:#eef2ff; }

/* LOGIN */
.login {
  width:320px;
  margin:80px auto;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px gray;
  text-align:center;
}
input { width:90%; padding:10px; margin:8px; }
button { width:95%; padding:10px; background:#1e3a8a; color:white; border:none; }

/* DASHBOARD */
header { display:none; background:#1e3a8a; color:white; padding:15px; text-align:center; }

.container { display:none; padding:20px; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 0 5px #ccc;
  cursor:pointer;
}

.card:hover { background:#dbeafe; }
</style>
</head>

<body>

<div class="login" id="loginBox">
  <h2>🔐 Smart Edu Pro</h2>
  <input id="email" placeholder="Email">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p>Demo: admin / 1234</p>
</div>

<header id="header">
  <h1>📚 Smart Edu Pro Dashboard</h1>
</header>

<div class="container" id="app">

<h2>📘 Masomo</h2>
<div class="grid">
  <div class="card">Math</div>
  <div class="card">Physics</div>
  <div class="card">Chemistry</div>
  <div class="card">Biology</div>
  <div class="card">English</div>
  <div class="card">ICT</div>
</div>

<h2>📖 Vitabu</h2>
<div class="grid">
  <div class="card">Download Math Book PDF</div>
  <div class="card">Physics Notes</div>
  <div class="card">Chemistry Guide</div>
</div>

</div>

<script>
function login(){
  let e=document.getElementById("email").value;
  let p=document.getElementById("pass").value;

  if(e=="admin" && p=="1234"){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("header").style.display="block";
    document.getElementById("app").style.display="block";
  } else {
    alert("Login failed");
  }
}
</script>

</body>
</html>
