<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<title>Smart Edu Pro</title>

<style>
body { font-family: Arial; margin:0; background:#eef2ff; }

/* BOX */
.box {
  width:320px;
  margin:80px auto;
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 0 10px gray;
  text-align:center;
}

input { width:90%; padding:10px; margin:8px; }

button {
  width:95%;
  padding:10px;
  background:#1e3a8a;
  color:white;
  border:none;
}

/* DASHBOARD */
header { display:none; background:#1e3a8a; color:white; padding:15px; text-align:center; }
.container { display:none; padding:20px; }

.card {
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h2>🔐 Login</h2>
  <input id="loginUser" placeholder="Username">
  <input id="loginPass" type="password" placeholder="Password">
  <button onclick="login()">Ingia</button>
  <p>Huna account? <a href="#" onclick="showRegister()">Register</a></p>
</div>

<!-- REGISTER -->
<div class="box" id="registerBox" style="display:none;">
  <h2>📝 Register</h2>
  <input id="regUser" placeholder="Username">
  <input id="regPass" type="password" placeholder="Password">
  <button onclick="register()">Create Account</button>
  <p>Una account? <a href="#" onclick="showLogin()">Login</a></p>
</div>

<!-- DASHBOARD -->
<header id="header">
  <h1>📚 Smart Edu Portal</h1>
</header>

<div class="container" id="app">
  <div class="card">📘 Hisabati</div>
  <div class="card">🔬 Sayansi</div>
  <div class="card">📖 English</div>
</div>

<script>
// Hifadhi user kwenye browser
let savedUser = "";
let savedPass = "";

// Switch screens
function showRegister(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("registerBox").style.display="block";
}

function showLogin(){
  document.getElementById("registerBox").style.display="none";
  document.getElementById("loginBox").style.display="block";
}

// Register
function register(){
  savedUser = document.getElementById("regUser").value;
  savedPass = document.getElementById("regPass").value;

  alert("Account created!");
  showLogin();
}

// Login
function login(){
  let u = document.getElementById("loginUser").value;
  let p = document.getElementById("loginPass").value;

  if(u === savedUser && p === savedPass){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("header").style.display="block";
    document.getElementById("app").style.display="block";
  } else {
    alert("Login incorrect!");
  }
}
</script>

</body>
</html>
